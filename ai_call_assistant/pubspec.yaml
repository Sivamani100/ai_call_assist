name: ai_call_assistant
description: AI Call Assistant for Android - Exotel Edition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.2
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1
  flutter_local_notifications: ^17.1.2
  hive_flutter: ^1.1.0
  http: ^1.2.1
  flutter_contacts: ^1.1.7+1
  permission_handler: ^11.3.1
  phone_numbers_parser: ^6.0.4
  intl: ^0.19.0
  timeago: ^3.6.1
  go_router: ^14.1.4
  shimmer: ^3.0.0
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Medium.ttf
          weight: 500
        - asset: fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: fonts/Inter-Bold.ttf
          weight: 700
